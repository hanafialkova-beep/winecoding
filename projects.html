<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekty | WineCoding</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-pattern"></div>

    <!-- Navigation -->
    <nav id="mainNav">
        <a href="index.html" class="logo">
            <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 4C16 4 8 8 8 16C8 20.4183 11.5817 24 16 24C20.4183 24 24 20.4183 24 16C24 8 16 4 16 4Z" fill="currentColor" opacity="0.3"/>
                <path d="M16 4C16 4 8 8 8 16C8 20.4183 11.5817 24 16 24C20.4183 24 24 20.4183 24 16C24 8 16 4 16 4Z" stroke="currentColor" stroke-width="2"/>
                <path d="M16 24V28M12 28H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            WineCoding
        </a>
        <div class="nav-links">
            <a href="projects.html" class="nav-link">Projekty</a>
            <a href="submit.html" class="nav-cta">Přidej projekt</a>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1>Projekty</h1>
        <p>Passion projekty od kreativních lidí</p>
    </header>

    <!-- Projects -->
    <main class="projects-container">
        <!-- Filters -->
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-category="all">Všechny</button>
            <button class="filter-btn" data-category="education">📚 Vzdělávání</button>
            <button class="filter-btn" data-category="home">🏠 Domácnost</button>
            <button class="filter-btn" data-category="creative">🎨 Kreativita</button>
            <button class="filter-btn" data-category="wellbeing">🧘 Wellbeing</button>
            <button class="filter-btn" data-category="fun">🎮 Zábava</button>
            <button class="filter-btn" data-category="utility">🔧 Utility</button>
        </div>

        <!-- Grid -->
        <div class="projects-grid stagger" id="projectsGrid">
            <!-- Rendered by JS -->
        </div>

        <!-- Empty state -->
        <div id="emptyState" style="display:none; text-align:center; padding:4rem 2rem;">
            <p style="font-size:3rem; margin-bottom:1rem;">🍷</p>
            <p style="color:var(--text-secondary); font-size:1.1rem;">Zatím tu žádné projekty nejsou.</p>
            <a href="submit.html" class="btn-primary" style="margin-top:1.5rem; display:inline-flex;">Buď první!</a>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-content" id="modalContent">
            <!-- filled by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="footer-logo">
                    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 4C16 4 8 8 8 16C8 20.4183 11.5817 24 16 24C20.4183 24 24 20.4183 24 16C24 8 16 4 16 4Z" fill="currentColor" opacity="0.3"/>
                        <path d="M16 4C16 4 8 8 8 16C8 20.4183 11.5817 24 16 24C20.4183 24 24 20.4183 24 16C24 8 16 4 16 4Z" stroke="currentColor" stroke-width="2"/>
                        <path d="M16 24V28M12 28H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    WineCoding
                </div>
                <p class="footer-tagline">Code with joy, share with love.</p>
            </div>
            <div class="footer-links">
                <a href="index.html">Domů</a>
                <a href="projects.html">Projekty</a>
                <a href="submit.html">Přidej projekt</a>
                <a href="admin.html">Admin</a>
            </div>
            <p class="footer-copy">© 2026 WineCoding. Made with 🍷, 🤖 and ❤️</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script>
        const categoryNames = {
            education: 'Vzdělávání',
            home: 'Domácnost',
            creative: 'Kreativita',
            wellbeing: 'Wellbeing',
            fun: 'Zábava',
            utility: 'Utility'
        };

        const categoryEmoji = {
            education: '📚',
            home: '🏠',
            creative: '🎨',
            wellbeing: '🧘',
            fun: '🎮',
            utility: '🔧'
        };

        let activeFilter = 'all';

        // Placeholder for broken images
        function getPlaceholderSVG(category) {
            const emoji = categoryEmoji[category] || '🍷';
            return `<div class="placeholder-img">${emoji}</div>`;
        }

        // Called from onerror on img tags
        function handleImgError(img, category) {
            img.parentElement.innerHTML = getPlaceholderSVG(category);
        }

        // Render projects
        function renderProjects() {
            const allProjects = WineCodeData.getApprovedProjects();
            const projects = activeFilter === 'all'
                ? allProjects
                : allProjects.filter(p => p.category === activeFilter);

            const grid = document.getElementById('projectsGrid');
            const empty = document.getElementById('emptyState');

            if (projects.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = '';
            empty.style.display = 'none';

            grid.innerHTML = projects.map(project => {
                const imgSrc = project.image || '';
                const hasImage = imgSrc && imgSrc.startsWith('http');

                return `
                <div class="project-card" onclick="openModal('${project.id}')">
                    <div class="project-preview">
                        ${hasImage
                            ? `<div class="shimmer"></div>
                               <img src="${imgSrc}" alt="${project.name}"
                                    loading="lazy"
                                    onload="this.style.opacity=1;this.previousElementSibling.remove()"
                                    onerror="this.parentElement.innerHTML='${getPlaceholderSVG(project.category).replace(/'/g, "\\'")}'"
                                    style="opacity:0;transition:opacity 0.4s ease">`
                            : getPlaceholderSVG(project.category)
                        }
                    </div>
                    <div class="project-info">
                        <span class="project-category-badge">${categoryEmoji[project.category] || ''} ${categoryNames[project.category] || project.category}</span>
                        <h3>${project.name}</h3>
                        <p>${project.description}</p>
                        <div class="project-footer">
                            <span class="project-author">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                ${project.authorName || 'Anonym'}
                            </span>
                            <span class="project-link">
                                Zobrazit
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // Modal
        function openModal(id) {
            const projects = WineCodeData.getApprovedProjects();
            const project = projects.find(p => p.id === id);
            if (!project) return;

            const modal = document.getElementById('projectModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div style="margin-bottom:1.5rem;">
                    <span class="project-category-badge">${categoryEmoji[project.category] || ''} ${categoryNames[project.category] || project.category}</span>
                </div>
                <h2 style="font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:1rem;color:var(--text-primary);">${project.name}</h2>
                <p style="color:var(--text-secondary);line-height:1.7;margin-bottom:1.5rem;">${project.description}</p>
                ${project.story ? `
                    <div style="background:var(--bg-card);border:1px solid var(--border-glass);border-radius:var(--radius-md);padding:1.25rem;margin-bottom:1.5rem;">
                        <p style="font-style:italic;color:var(--text-secondary);line-height:1.7;">"${project.story}"</p>
                    </div>
                ` : ''}
                ${project.authorName ? `
                    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:1.5rem;">
                        Autor: <strong style="color:var(--text-primary);">${project.authorName}</strong>
                    </p>
                ` : ''}
                <a href="${project.url}" target="_blank" class="btn-primary" style="width:100%;justify-content:center;">
                    Otevřít projekt
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
                </a>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close on overlay click
        document.getElementById('projectModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close on Escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // Filter buttons
        document.getElementById('filterBar').addEventListener('click', function(e) {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.category;
            renderProjects();
        });

        // URL param filter
        const urlCat = new URLSearchParams(window.location.search).get('category');
        if (urlCat) {
            activeFilter = urlCat;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.category === urlCat);
            });
        }

        // Nav scroll
        const mainNav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => {
            mainNav.classList.toggle('scrolled', window.scrollY > 40);
        });

        // Init
        renderProjects();
    </script>
</body>
</html>
